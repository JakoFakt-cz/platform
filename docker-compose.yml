services:
  frontend:
    build:
      context: .
      dockerfile: Dockerfile
      target: frontend
    ports:
      - "3000:3000"
    env_file:
      - ./frontend/.env
    environment:
    - BACKEND_URL=http://backend:4000
    depends_on:
      - backend
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile
      target: backend
    ports:
      - "4000:4000"
    env_file:
      - ./backend/.env
    restart: unless-stopped