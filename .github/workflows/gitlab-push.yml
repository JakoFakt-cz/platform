name: Mirror to GitLab

on:
  push:
    branches: ["**"]

jobs:
  mirror:
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v3
        with:
          fetch-depth: 0
      
      - name: Push to GitLab
        run: |
          git config --global http.sslVerify false
          git remote add gitlab https://oauth2:${{ secrets.GITLAB_TOKEN }}@gitlab.kyberna.cz/${{ secrets.USERNAME }}/${{ secrets.REPOSITORY }}.git
          git push gitlab --all --force
          git push gitlab --tags --force
